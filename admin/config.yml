# =============================================================
# Decap CMS Configuration — juangervasoni.com
# Replace YOUR_GITHUB_USERNAME and YOUR_REPO_NAME below
# =============================================================

backend:
  name: github
  repo: YOUR_GITHUB_USERNAME/YOUR_REPO_NAME
  branch: main

# Where uploaded images go in your repo
media_folder: images/uploads
public_folder: /images/uploads

# =============================================================
# COLLECTIONS
# =============================================================

collections:

  # ---------------------------
  # BLOG POSTS
  # ---------------------------
  - name: blog
    label: Blog Posts
    folder: blog
    create: true
    slug: "{{slug}}"
    fields:
      - label: Title
        name: title
        widget: string
        hint: "Aim for 50-60 characters for SEO"

      - label: Publish Date
        name: date
        widget: datetime

      - label: Focus Keyword
        name: focus_keyword
        widget: string
        hint: "The main keyword you want this post to rank for"

      - label: Meta Description
        name: description
        widget: text
        hint: "Aim for 120-160 characters. Include your focus keyword."

      - label: Featured Image
        name: thumbnail
        widget: image
        required: false

      - label: Category
        name: category
        widget: select
        options:
          - Video Editing
          - Marketing Strategy
          - Motion Graphics
          - Case Studies
          - Behind the Scenes

      - label: Body
        name: body
        widget: markdown

  # ---------------------------
  # SITE SETTINGS (Hero, About, etc.)
  # ---------------------------
  - name: settings
    label: Site Settings
    files:

      - label: Hero Section
        name: hero
        file: _data/hero.json
        fields:
          - { label: Headline Line 1, name: headline1, widget: string }
          - { label: Headline Line 2 (accent), name: headline2, widget: string }
          - { label: Subheadline, name: subheadline, widget: text }
          - { label: Stat Number, name: stat_number, widget: string, hint: "e.g. 250M+" }
          - { label: Stat Label, name: stat_label, widget: string }
          - { label: Primary CTA Text, name: cta_primary, widget: string }
          - { label: Secondary CTA Text, name: cta_secondary, widget: string }

      - label: About Section
        name: about
        file: _data/about.json
        fields:
          - { label: Years of Experience, name: years, widget: string, hint: "e.g. 12+" }
          - { label: Bio Paragraph 1, name: bio1, widget: text }
          - { label: Bio Paragraph 2, name: bio2, widget: text }

      - label: Services
        name: services
        file: _data/services.json
        fields:
          - label: Services
            name: items
            widget: list
            fields:
              - { label: Title, name: title, widget: string }
              - { label: Description, name: description, widget: text }
